<!DOCTYPE html>
<html lang="en" class="hide-scrollbar" data-theme="{{theme}}" id="htmlRoot">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home_styles.css') }}" />
    <title>Analytics Dashboard</title>
    <style>
        .dashboard-iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
            border-radius: 8px;
            background-color: var(--card-bg);
            /* Use theme variable if available, or fallback */
        }

        .main-content {
            padding: 20px;
            overflow-y: hidden;
            /* Prevent double scrollbars if possible */
        }

        .dashboard-header h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        /* Ensure sidebar links work as expected styling-wise */
        .nav-icon a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div class="homepage-container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <div class="logo-wrapper"
                        style="display: flex; align-items: center; justify-content: center; height: 100%;">
                    </div>
                </div>
                <div class="nav-icons">
                    <!-- Home Button -->
                    <a href="/" class="nav-icon" title="Home" style="text-decoration: none;">
                        <img src="/static/images/lucide_icons/house.svg" alt="Home" class="icon-svg">
                    </a>
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="nav-icon">
                    <img src="/static/images/Avatar.svg" alt="User" class="icon-svg">
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <div class="dashboard-header">
            </div>

            <iframe title="Diggibyte"
                src="https://app.powerbi.com/view?r=eyJrIjoiYzM3YzI2NWItYzBhZS00YjcyLWFiNDgtNjdjODFjNDg3NmFlIiwidCI6ImQwNzRlOTE3LWM4ZDktNDJjYy04OTg2LTJjZDFiZGZiZDA3OSJ9"
                class="dashboard-iframe" allowfullscreen>
            </iframe>

            <p style="text-align: center; margin-top: 10px; color: var(--text-muted, #999); font-size: 0.9em;">
                *Data powered by Azure Databricks. Refresh for latest figures.*
            </p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>

    </html>
